<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AAMPAV Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <h1>AAMPAV</h1>
      <div id="bot-status" class="status">Status: ...</div>
      <div class="controls">
        <button onclick="deposit()">Deposit</button>
        <button onclick="startBot()">Start Bot</button>
        <button onclick="stopBot()">Stop Bot</button>
        <button onclick="collect()">Collect</button>
      </div>
      <div class="logs">
        <h2>Logs</h2>
        <pre id="logs">Loading logs...</pre>
      </div>
    </aside>

    <!-- Main dashboard -->
    <main class="dashboard">
      <div>
  <h3 class="text-xl font-semibold mb-2">Symbolic Candlesticks</h3>
  <div id="symbolic-candles" class="flex space-x-4 items-end"></div>
</div>

      <section class="profit">
        <h2>Daily Profit</h2>
        <div id="daily-profit">$0.00</div>
      </section>

      <section class="signals">
        <h2>Profit Signals</h2>
        <ul id="signals">
          <li>Loading...</li>
        </ul>
      </section>

      <section class="market">
        <h2>Market Overview</h2>
        <table id="market-table">
          <thead>
            <tr>
              <th>Asset</th>
              <th>Price</th>
              <th>Change</th>
              <th>Volume</th>
            </tr>
          </thead>
          <tbody id="market-body">
            <tr><td colspan="4">Loading...</td></tr>
          </tbody>
        </table>
      </section>

      <section class="brokers">
        <h2>Connected Brokers</h2>
        <ul id="brokers">
          <li>Loading...</li>
        </ul>
      </section>
    </main>
  </div>

  <!-- Scripts -->
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <script>
    const BACKEND = 'https://aampav-backend.onrender.com';

    async function startBot() {
      await fetch(`${BACKEND}/start-bot`, { method: 'POST' });
      log("Bot started.");
    }

    async function stopBot() {
      await fetch(`${BACKEND}/stop-bot`, { method: 'POST' });
      log("Bot stopped.");
    }

    async function deposit() {
      await fetch(`${BACKEND}/deposit`, { method: 'POST' });
      log("Deposit initiated.");
    }

    async function collect() {
      await fetch(`${BACKEND}/collect`, { method: 'POST' });
      log("Profit collected.");
    }

    function log(msg) {
      const logs = document.getElementById('logs');
      logs.textContent += `\n${new Date().toLocaleTimeString()} - ${msg}`;
      logs.scrollTop = logs.scrollHeight;
    }

    async function loadStatus() {
      const res = await fetch(`${BACKEND}/status`);
      const data = await res.json();
      document.getElementById('bot-status').textContent = "Status: " + data.status;
    }

    async function loadSymbolicCandles() {
  const res = await fetch(`${BACKEND_URL}/symbolic-candles`);
  const data = await res.json(); // Format: [{symbol: "BTC", trend: 3}, ...]

  const container = document.getElementById('symbolic-candles');
  container.innerHTML = '';

  data.forEach(d => {
    const color = d.trend > 0 ? 'bg-green-500' : 'bg-red-500';
    const height = Math.min(10, Math.abs(d.trend)) * 4;

    const el = document.createElement('div');
    el.className = 'flex flex-col items-center';
    el.innerHTML = `
      <div class="w-2 ${color}" style="height: ${height}px;"></div>
      <span class="text-xs mt-1">${d.symbol}</span>
    `;
    container.appendChild(el);
  });
}

    async function loadProfit() {
      const res = await fetch(`${BACKEND}/profit-today`);
      const data = await res.json();
      document.getElementById('daily-profit').textContent = `$${data.profit.toFixed(2)}`;
    }

    async function loadSignals() {
      const res = await fetch(`${BACKEND}/signals`);
      const data = await res.json();
      document.getElementById('signals').innerHTML = data.signals.map(s => `<li>${s}</li>`).join('');
    }

    async function loadBrokers() {
      const res = await fetch(`${BACKEND}/brokers`);
      const data = await res.json();
      document.getElementById('brokers').innerHTML = data.brokers.map(b => `<li>${b}</li>`).join('');
    }

    async function loadMarket() {
      const symbols = ['AAPL', 'TSLA', 'MSFT', 'GOOG'];
      const tbody = document.getElementById('market-body');
      const rows = await Promise.all(symbols.map(async symbol => {
        const res = await fetch(`${BACKEND}/price?symbol=${symbol}`);
        const data = await res.json();
        return `
          <tr>
            <td>${symbol}</td>
            <td>${data.price}</td>
            <td>${data.change_percent.toFixed(2)}%</td>
            <td>${data.volume ?? '—'}</td>
          </tr>`;
      }));
      tbody.innerHTML = rows.join('');
    }

    async function loadChart() {
      const res = await fetch(`${BACKEND}/candles`);
      const data = await res.json();
      const chartContainer = document.getElementById('chart');
      const chart = LightweightCharts.createChart(chartContainer, {
        layout: { backgroundColor: '#1e1e1e', textColor: '#ffffff' },
        grid: { vertLines: { color: '#444' }, horzLines: { color: '#444' } },
        timeScale: { timeVisible: true },
        width: chartContainer.clientWidth,
        height: chartContainer.clientHeight
      });
      const series = chart.addCandlestickSeries();
      series.setData(data.map(d => ({
        time: new Date(d.Date).getTime() / 1000,
        open: d.Open,
        high: d.High,
        low: d.Low,
        close: d.Close
      })));
    }

    function refreshAll() {
      loadStatus();
      loadLogs();
      loadProfit();
      loadSignals();
      loadBrokers();
      loadMarket();
    }

    // Initial load
    setInterval(() => {
  updateProfit();
  loadSignals();
  loadLogs();
  loadSymbolicCandles();
}, 10000);

  </script>
</body>
</html>
